<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>MediVault Pro | MCCQE1 Elite Hub</title>
  <style>
    :root{
      --navy:#0b1730; --navy2:#132347; --gold:#c8a45c; --bg:#f4f7fb;
      --card:#ffffff; --text:#1f2a37; --muted:#6b7280; --line:#e5e7eb;
      --green:#22c55e; --red:#ef4444; --blue:#2563eb; --shadow:0 10px 25px rgba(15,23,42,.08); --radius:16px;
    }
    *{ box-sizing:border-box; -webkit-user-select:none; user-select:none; }
    body{ margin:0; font-family:Segoe UI, Arial, sans-serif; background:var(--bg); color:var(--text); padding-bottom:100px; }
    
    header{ position:sticky; top:0; z-index:1000; background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff; border-bottom:3px solid var(--gold); }
    .topbar{ max-width:1100px; margin:0 auto; padding:16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .brand{ font-size:1.4rem; font-weight:900; }
    
    .social-btns{ display:flex; gap:8px; }
    .social-link{ color:#fff; text-decoration:none; background:rgba(255,255,255,0.15); padding:8px 12px; border-radius:999px; font-size:0.8rem; font-weight:800; border:1px solid rgba(255,255,255,0.2); transition:0.2s; }

    .main-tabs{ display:flex; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:67px; z-index:999; }
    .tab{ flex:1; text-align:center; padding:14px; cursor:pointer; font-weight:800; color:#64748b; }
    .tab.active{ color:var(--blue); border-bottom:4px solid var(--blue); background:#f8fbff; }

    .container{ max-width:1100px; margin:20px auto; padding:0 14px; }
    .panel{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }

    /* Mode Toggles & Timer */
    .mode-toolbar{ padding:12px 16px; background:#f1f5f9; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
    .timer-box{ font-weight:900; color:var(--red); font-size:1.1rem; display:none; }
    .mode-switch{ display:flex; gap:5px; background:#e2e8f0; padding:4px; border-radius:8px; }
    .m-btn{ border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:800; font-size:0.75rem; }
    .m-btn.active{ background:var(--navy); color:#fff; }

    .dashboard{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; padding:16px; }
    .sub-card{ background:#fff; border-radius:18px; padding:20px; text-align:center; cursor:pointer; border:1px solid var(--line); transition:.2s; }
    .sub-card:hover{ transform:translateY(-4px); border-color:var(--gold); }
    .sub-card i{ display:block; font-size:2.2rem; margin-bottom:10px; }
    .sub-card h3{ margin:0; font-size:1rem; }
    .sub-card p{ color:var(--muted); font-size:0.8rem; font-weight:700; margin:5px 0 0; }

    .card{ background:#fff; border-radius:18px; border:1px solid var(--line); margin-bottom:16px; overflow:hidden; }
    .card-header{ padding:12px 18px; color:#fff; font-weight:800; }
    .card-body{ padding:25px; line-height:1.7; font-size:1.05rem; }
    
    .content-img { width: 100%; max-width: 600px; height: auto; border-radius: 12px; margin: 15px auto; border: 1px solid var(--line); display: block; background: #eee; }
    
    table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size:0.92rem; }
    th, td { border: 1px solid var(--line); padding: 10px; text-align: left; }
    th { background: #f8fafc; }
    
    .hl-blue { color: var(--blue); font-weight: 800; }
    .hl-green { color: #16a34a; font-weight: 800; }
    .hl-red { color: var(--red); font-weight: 800; }

    .option{ padding:14px; border:1px solid #dbe2ea; border-radius:12px; margin-bottom:10px; cursor:pointer; background: #fff; }
    .option.selected{ border-color:var(--blue); background:#eff6ff; }
    .option.correct{ background:#e9f9ef!important; border-color:#22c55e!important; color:#166534; font-weight:800; }
    .option.wrong{ background:#fef0f0!important; border-color:#ef4444!important; color:#991b1b; font-weight:800; }
    .rationale{ display:none; margin-top:15px; padding:15px; border-top:1px solid var(--line); background: #f9fafb; border-radius: 8px; }

    .btn{ border:none; border-radius:12px; padding:14px; font-weight:800; cursor:pointer; flex:1; }
    .btn-gold{ background:var(--gold); color:#fff; }
    .btn-light{ background:#f3f4f6; color:var(--text); }

    .cat-Emergency{ border-top:6px solid #b91c1c; } .head-Emergency{ background:#b91c1c; }
    .cat-Medicine{ border-top:6px solid #f59e0b; } .head-Medicine{ background:#f59e0b; }
    .cat-Ethics{ border-top:6px solid #0ea5e9; } .head-Ethics{ background:#0ea5e9; }

    #sub-dashboard, #view-area, #main-dashboard { display:none; }
  </style>
</head>
<body>

  <header>
    <div class="topbar">
      <div class="brand">MEDIVAULT PRO</div>
      <div class="social-btns">
        <a class="social-link" href="https://www.youtube.com/@Drab123-v7l" target="_blank">📺 YouTube</a>
        <a class="social-link" href="https://www.facebook.com/share/1B5BwQUhim/" target="_blank">📘 Facebook</a>
      </div>
    </div>
  </header>

  <div class="main-tabs">
    <div class="tab active" id="tab-questions" onclick="switchMainTab('questions')">Q-BANK</div>
    <div class="tab" id="tab-notes" onclick="switchMainTab('notes')">HIGH-YIELD</div>
  </div>

  <div class="container">
    <div class="panel">
      
      <div id="mode-panel" class="mode-toolbar" style="display:none;">
        <div class="mode-switch">
          <button id="m-study" class="m-btn active" onclick="setMode('study')">Study Mode</button>
          <button id="m-exam" class="m-btn" onclick="setMode('exam')">Exam Mode</button>
        </div>
        <div id="timer" class="timer-box">00:00</div>
      </div>

      <div id="main-dashboard" class="dashboard"></div>
      <div id="sub-dashboard" class="dashboard"></div>
      
      <div id="view-area" style="padding:16px;">
        <div id="progress-text" style="font-weight:800; color:var(--muted); margin-bottom:10px; font-size:0.9rem;"></div>
        <div id="content-container"></div>
        <div class="nav-btns" id="nav-btns" style="display:flex; gap:10px; margin-top:15px;"></div>
        <button class="btn btn-light" style="width:100%; margin-top:10px;" onclick="goBack()">← Back</button>
      </div>
    </div>
  </div>

  <script>
    let bank=[], notes=[], filteredQuestions=[], filteredNotes=[], currentIdx=0;
    let activeMainTab="questions", currentCategory="", currentSubcategory="";
    let examMode = false, examSeconds = 0, timerInterval;
    let answered = JSON.parse(localStorage.getItem('answered_questions') || '[]');
    let userSelections = {}; // تخزين إجابات وضع الامتحان

    const qFiles = ["questions.json", "extra_questions.json", "extra_questions_2.json", "ethics_questions.json"];
    const nFiles = ["notes.json", "clinical_cards.json", "extra1.json"];

    async function init(){
      let rawB = [];
      for(let f of qFiles) { const d = await fetchJson(f); rawB = rawB.concat(d); }
      bank = sanitize(rawB);
      for(let f of nFiles) { const d = await fetchJson(f); notes = notes.concat(d); }
      renderMain();
    }

    async function fetchJson(f){ try{ const r = await fetch(`./${f}?v=${Date.now()}`); return await r.json(); }catch(e){ return []; } }
    function sanitize(d){ const s = new Set(); return d.filter(q => { if(!q.text || s.has(q.text.trim().toLowerCase())) return false; s.add(q.text.trim().toLowerCase()); return true; }); }

    function getSafeImg(src) {
        if (!src) return '';
        const pSrc = `https://images.weserv.nl/?url=${encodeURIComponent(src.trim())}&w=600&output=png`;
        return `<img src="${pSrc}" class="content-img" onerror="this.style.display='none'">`;
    }

    function setMode(m){
        examMode = (m === 'exam');
        document.getElementById('m-study').classList.toggle('active', !examMode);
        document.getElementById('m-exam').classList.toggle('active', examMode);
        document.getElementById('timer').style.display = examMode ? 'block' : 'none';
        if(examMode) startTimer(); else stopTimer();
        start(currentSubcategory); // إعادة تشغيل المحتوى بالوضع الجديد
    }

    function startTimer(){
        examSeconds = 0; clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            examSeconds++;
            let m = Math.floor(examSeconds/60).toString().padStart(2,'0');
            let s = (examSeconds%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }
    function stopTimer(){ clearInterval(timerInterval); }

    function hideAll(){
        document.getElementById("main-dashboard").style.display="none";
        document.getElementById("sub-dashboard").style.display="none";
        document.getElementById("view-area").style.display="none";
        document.getElementById("mode-panel").style.display="none";
    }

    function renderMain(){
      hideAll(); const data = activeMainTab==="questions"?bank:notes;
      const cats = [...new Set(data.map(x=>x.cat))].sort();
      const db = document.getElementById("main-dashboard"); db.style.display="grid";
      db.innerHTML = cats.map(c => `<div class="sub-card" onclick="openCat('${c}')"><i>${getIcon(c)}</i><h3>${c}</h3><p>${data.filter(x=>x.cat===c).length} items</p></div>`).join("");
    }

    function openCat(c){
      hideAll(); currentCategory = c; const data = activeMainTab==="questions"?bank:notes;
      const subs = [...new Set(data.filter(x=>x.cat===c).map(x=>x.sub||"General"))].sort();
      const sdb = document.getElementById("sub-dashboard"); sdb.style.display="grid";
      sdb.innerHTML = `<div class="sub-card" onclick="start('All')"><i>📂</i><h3>All Items</h3><p>${data.filter(x=>x.cat===c).length} items</p></div>` + 
        subs.map(s => {
          const count = data.filter(x=>x.cat===c && (x.sub||"General")===s).length;
          return `<div class="sub-card" onclick="start('${s}')"><i>🧩</i><h3>${s}</h3><p>${count} items</p></div>`;
        }).join("") +
        `<div class="sub-card" onclick="goBack()" style="background:#fef2f2;"><i>↩️</i><h3>Back</h3></div>`;
    }

    function start(s){
      hideAll(); currentSubcategory = s; currentIdx = 0; userSelections = {};
      document.getElementById("view-area").style.display = "block";
      if(activeMainTab === "questions") document.getElementById("mode-panel").style.display = "flex";

      if(activeMainTab==="notes"){
        filteredNotes=notes.filter(n=>n.cat===currentCategory&&(s==="All"||n.sub===s)); showNote();
      } else {
        filteredQuestions=bank.filter(q=>q.cat===currentCategory&&(s==="All"||q.sub===s)); showQ();
      }
    }

    function showNote(){
      const n = filteredNotes[currentIdx], container = document.getElementById("content-container");
      document.getElementById("progress-text").innerText = `High-Yield > ${currentCategory} (${currentIdx+1}/${filteredNotes.length})`;
      container.innerHTML = `
        <div class="card cat-${n.cat}" style="border-top:6px solid var(--blue)">
          <div class="card-header" style="background:var(--blue)">${n.title}</div>
          <div class="card-body">
            ${getSafeImg(n.img)}
            <div>${formatText(n.content)}</div>
          </div>
        </div>`;
      renderNav();
    }

    function showQ(){
      const q = filteredQuestions[currentIdx], container = document.getElementById("content-container");
      document.getElementById("progress-text").innerText = `Q-Bank > ${currentCategory} (${currentIdx+1}/${filteredQuestions.length})`;
      
      let optionsHtml = q.options.map((o,i) => {
          let state = "";
          if(!examMode && answered.includes(q.id + i)) state = (i === q.correct ? "correct" : "wrong");
          if(examMode && userSelections[currentIdx] === i) state = "selected";
          return `<div class="option ${state}" onclick="handleAns(${i},${q.correct},'${q.id}')">${o}</div>`;
      }).join("");

      container.innerHTML = `
        <div class="card cat-${q.cat}" style="border-top:6px solid var(--navy)">
          <div class="card-header" style="background:var(--navy)">ID: ${q.id}</div>
          <div class="card-body">
            <div style="font-weight:800; margin-bottom:15px;">${q.text}</div>
            ${getSafeImg(q.img)}
            ${optionsHtml}
            <div class="rationale" id="rat" style="${!examMode && answered.includes(q.id) ? 'display:block' : ''}">
              <strong>Explanation:</strong><br>${formatText(q.rationale)}
            </div>
          </div>
        </div>`;
      renderNav();
    }

    function handleAns(idx, cor, qId){
        if(examMode){
            userSelections[currentIdx] = idx; showQ();
        } else {
            const opts = document.querySelectorAll(".option");
            opts.forEach((op,i)=> op.className = "option " + (i===cor?"correct":(i===idx?"wrong":"")));
            document.getElementById("rat").style.display="block";
            if(!answered.includes(qId)){ answered.push(qId); localStorage.setItem('answered_questions', JSON.stringify(answered)); }
        }
    }

    function renderNav(){
        let btnText = (currentIdx === filteredQuestions.length - 1 && examMode) ? "Finish Exam" : "Next";
        document.getElementById("nav-btns").innerHTML = `
            <button class="btn btn-light" onclick="prev()">Previous</button>
            <button class="btn btn-gold" onclick="next()">${btnText}</button>
        `;
    }

    function next(){
        const data = activeMainTab==="questions"?filteredQuestions:filteredNotes;
        if(currentIdx < data.length - 1){
            currentIdx++; activeMainTab==="questions"?showQ():showNote();
        } else if(examMode) {
            finishExam();
        }
    }
    function prev(){ if(currentIdx > 0){ currentIdx--; activeMainTab==="questions"?showQ():showNote(); } }

    function finishExam(){
        stopTimer();
        let score = 0;
        filteredQuestions.forEach((q, i) => { if(userSelections[i] === q.correct) score++; });
        alert(`Exam Finished!\nScore: ${score}/${filteredQuestions.length}\nTime: ${document.getElementById('timer').innerText}`);
        examMode = false; // العودة لوضع الدراسة لمراجعة الإجابات
        setMode('study');
    }

    function formatText(t){ if(!t) return ""; return t.replace(/Dx:/g, '<span class="hl-blue">Dx:</span>').replace(/Tx:/g, '<span class="hl-green">Tx:</span>').replace(/Risk:/g, '<span class="hl-red">Risk:</span>').replace(/\n/g, "<br>"); }
    function goBack(){ if(document.getElementById("view-area").style.display==="block") openCat(currentCategory); else renderMain(); }
    function switchMainTab(t){ activeMainTab=t; document.getElementById("tab-questions").className=t==="questions"?"tab active":"tab"; document.getElementById("tab-notes").className=t==="notes"?"tab active":"tab"; renderMain(); }
    function getIcon(c){ const i = {Medicine:"🩺", Surgery:"🔪", Pediatrics:"👶", Psychiatry:"🧠", Ethics:"⚖️", Emergency:"🚨"}; return i[c]||"📚"; }
    init();
  </script>
  
  <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" data-id="MediVaultPro" data-description="Support me on Buy me a coffee!" data-message="Help us keep the MCCQE1 vault free for all IMGs! ☕" data-color="#5F7FFF" data-position="Right" data-x_margin="18" data-y_margin="18"></script>
</body>
</html>
