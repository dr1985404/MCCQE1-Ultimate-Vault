<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediVault Pro | Free MCCQE1 Qbank & High-Yield Notes</title>
  
  <style>
    :root{
      --navy:#0b1730; --navy2:#132347; --gold:#c8a45c; --bg:#f5f7fb;
      --card:#ffffff; --text:#1f2a37; --muted:#6b7280; --line:#e5e7eb;
      --green:#22c55e; --red:#ef4444; --blue:#2563eb; --purple:#8b5cf6;
      --pink:#ec4899; --shadow:0 10px 25px rgba(15,23,42,.08); --radius:16px;
    }

    *{ box-sizing:border-box; -webkit-user-select:none; user-select:none; }
    body{ margin:0; font-family:Segoe UI, Arial, sans-serif; background:#f4f7fb; color:var(--text); padding-bottom:90px; }
    
    header{ position:sticky; top:0; z-index:1000; background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff; border-bottom:3px solid var(--gold); }
    .topbar{ max-width:1100px; margin:0 auto; padding:16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .brand{ font-size:1.45rem; font-weight:900; }
    .hero-link{ color:#fff; text-decoration:none; background:rgba(255,255,255,.1); padding:8px 12px; border-radius:999px; font-size:.85rem; }

    .main-tabs{ display:flex; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:67px; z-index:999; }
    .tab{ flex:1; text-align:center; padding:14px; cursor:pointer; font-weight:800; color:#64748b; }
    .tab.active{ color:var(--blue); border-bottom:4px solid var(--blue); background:#f8fbff; }

    .container{ max-width:1100px; margin:20px auto; padding:0 14px; }
    .panel{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }

    /* Progress Tracker Style */
    .progress-bar-container { background: #e2e8f0; border-radius: 999px; height: 10px; margin: 10px 0; overflow: hidden; }
    .progress-fill { background: var(--green); height: 100%; width: 0%; transition: width 0.3s ease; }
    .stats-box { font-size: 0.85rem; font-weight: bold; color: var(--navy); margin-bottom: 5px; }

    .toolbar{ padding:14px; border-bottom:1px solid var(--line); background:#fafcff; }
    .dashboard{ display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:16px; }
    .sub-card{ background:#fff; border-radius:18px; padding:20px; text-align:center; cursor:pointer; border:1px solid var(--line); transition:.2s; }
    .sub-card:hover{ transform:translateY(-4px); border-color:var(--gold); }
    .sub-card i{ display:block; font-size:2rem; margin-bottom:10px; }

    .card{ background:#fff; border-radius:18px; border:1px solid var(--line); box-shadow:var(--shadow); overflow:hidden; margin-bottom:16px; }
    .card-header{ padding:12px 18px; color:#fff; font-weight:800; display:flex; justify-content:space-between; }
    .card-body{ padding:20px; line-height:1.6; }
    
    /* Image Style */
    .content-img { max-width: 100%; height: auto; border-radius: 12px; margin: 15px 0; border: 1px solid var(--line); display: block; margin-left: auto; margin-right: auto; }

    .option{ padding:12px; border:1px solid #dbe2ea; border-radius:12px; margin-bottom:8px; cursor:pointer; transition:.1s; }
    .option.correct{ background:#e9f9ef!important; border-color:#22c55e!important; color:#166534; font-weight:800; }
    .option.wrong{ background:#fef0f0!important; border-color:#ef4444!important; color:#991b1b; font-weight:800; }
    .rationale{ display:none; margin-top:15px; padding-top:15px; border-top:1px solid var(--line); color:#334155; }

    .btn{ border:none; border-radius:12px; padding:12px; font-weight:800; cursor:pointer; flex:1; }
    .btn-blue{ background:var(--blue); color:#fff; }
    .btn-gold{ background:var(--gold); color:#fff; }
    .btn-light{ background:#f3f4f6; color:#111827; }

    /* Category Themes */
    .cat-Psychiatry{ border-top:6px solid var(--purple); } .head-Psychiatry{ background:var(--purple); }
    .cat-Pediatrics{ border-top:6px solid var(--green); } .head-Pediatrics{ background:var(--green); }
    .cat-Ethics{ border-top:6px solid #0ea5e9; } .head-Ethics{ background:#0ea5e9; }
    .cat-Medicine{ border-top:6px solid #f59e0b; } .head-Medicine{ background:#f59e0b; }
    .cat-Surgery{ border-top:6px solid #ef4444; } .head-Surgery{ background:#ef4444; }
    .cat-OBGYN{ border-top:6px solid var(--pink); } .head-OBGYN{ background:var(--pink); }

    #sub-dashboard, #view-area{ display:none; }
    
    @media (max-width: 600px){ .topbar{ flex-direction:column; } .main-tabs{ top:110px; } }
  </style>
</head>
<body oncontextmenu="return false;">

  <header>
    <div class="topbar">
      <div class="brand">MEDIVAULT PRO</div>
      <div style="display:flex; gap:8px;">
        <a class="hero-link" href="https://www.youtube.com/@Drab123-v7l" target="_blank">YouTube</a>
        <a class="hero-link" href="https://www.facebook.com/share/1B5BwQUhim/" target="_blank">Facebook</a>
      </div>
    </div>
  </header>

  <div class="main-tabs">
    <div class="tab active" id="tab-questions" onclick="switchMainTab('questions')">Q-BANK</div>
    <div class="tab" id="tab-notes" onclick="switchMainTab('notes')">HIGH-YIELD</div>
  </div>

  <div class="container">
    <div class="panel">
      <div class="toolbar" id="progress-toolbar">
        <div class="stats-box" id="stats-text">Answered: 0 / 0 (0%)</div>
        <div class="progress-bar-container">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div style="padding:14px">
        <div id="main-dashboard" class="dashboard"></div>
        <div id="sub-dashboard" class="dashboard"></div>
        <div id="view-area">
          <div id="progress-text" style="font-size:0.9rem; font-weight:800; margin-bottom:10px; color:var(--muted);"></div>
          <div id="content-container"></div>
          <div style="display:flex; gap:10px; margin-top:15px;" id="nav-btns"></div>
          <button class="btn btn-light" style="width:100%; margin-top:10px;" onclick="goBack()">← Back</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let bank = []; let notes = []; let filteredQuestions = [];
    let currentIdx = 0; let activeMainTab = "questions";
    let currentCategory = ""; let currentSubcategory = "";
    
    // Progress Tracking
    let answeredQuestions = JSON.parse(localStorage.getItem('answered_questions') || '[]');

    const qFiles = ["questions.json", "extra_questions.json", "extra_questions_2.json", "ethics_questions.json"];
    const nFiles = ["notes.json", "clinical_cards.json", "extra1.json"];

    async function init(){
      for(let f of qFiles) { const d = await fetchJson(f); bank = bank.concat(d); }
      for(let f of nFiles) { const d = await fetchJson(f); notes = notes.concat(d); }
      updateProgressUI();
      renderMainDashboard();
    }

    async function fetchJson(f){
      try{ const r = await fetch(`./${f}?v=${Date.now()}`); return await r.json(); }
      catch(e){ return []; }
    }

    function updateProgressUI(){
      const total = bank.length;
      const count = answeredQuestions.length;
      const percent = total > 0 ? Math.round((count/total)*100) : 0;
      document.getElementById('stats-text').innerText = `Answered: ${count} / ${total} (${percent}%)`;
      document.getElementById('progress-fill').style.width = percent + "%";
      document.getElementById('progress-toolbar').style.display = activeMainTab === "questions" ? "block" : "none";
    }

    function renderMainDashboard(){
      const data = activeMainTab === "questions" ? bank : notes;
      const cats = [...new Set(data.map(x => x.cat))].sort();
      const db = document.getElementById("main-dashboard");
      db.style.display = "grid";
      document.getElementById("sub-dashboard").style.display = "none";
      document.getElementById("view-area").style.display = "none";

      db.innerHTML = cats.map(c => `
        <div class="sub-card" onclick="openCategory('${c}')">
          <i>${getIcon(c)}</i>
          <h3>${c}</h3>
          <p>${data.filter(x=>x.cat===c).length} items</p>
        </div>
      `).join("");
    }

    function openCategory(c){
      currentCategory = c;
      const data = activeMainTab === "questions" ? bank : notes;
      const subs = [...new Set(data.filter(x=>x.cat===c).map(x=>x.sub || "General"))].sort();
      const sdb = document.getElementById("sub-dashboard");
      
      document.getElementById("main-dashboard").style.display = "none";
      document.getElementById("view-area").style.display = "none";
      sdb.style.display = "grid";

      sdb.innerHTML = `
        <div class="sub-card" onclick="startContent('All')"><i>📂</i><h3>All</h3></div>
        ${subs.map(s => `<div class="sub-card" onclick="startContent('${s}')"><i>🧩</i><h3>${s}</h3></div>`).join("")}
        <div class="sub-card" onclick="goBack()" style="background:#fef2f2;"><i>↩️</i><h3>Main Menu</h3></div>
      `;
    }

    function startContent(s){
      currentSubcategory = s;
      document.getElementById("sub-dashboard").style.display = "none";
      document.getElementById("view-area").style.display = "block";

      if(activeMainTab === "notes"){
        const filtered = notes.filter(n => n.cat === currentCategory && (s === "All" || n.sub === s));
        document.getElementById("content-container").innerHTML = filtered.map(n => `
          <div class="card cat-${n.cat}">
            <div class="card-header head-${n.cat}">${n.title}</div>
            <div class="card-body">
              ${n.img ? `<img src="${n.img}" class="content-img">` : ''}
              ${n.content.replace(/\n/g, "<br>")}
            </div>
          </div>
        `).join("");
      } else {
        filteredQuestions = bank.filter(q => q.cat === currentCategory && (s === "All" || q.sub === s));
        currentIdx = 0;
        showQuestion();
      }
    }

    function showQuestion(){
      const q = filteredQuestions[currentIdx];
      const container = document.getElementById("content-container");
      document.getElementById("progress-text").innerText = `${currentCategory} > ${currentSubcategory} (${currentIdx + 1}/${filteredQuestions.length})`;
      
      container.innerHTML = `
        <div class="card cat-${q.cat}">
          <div class="card-header head-${q.cat}">Question ID: ${q.id || 'N/A'}</div>
          <div class="card-body">
            <div style="font-weight:800; margin-bottom:15px;">${q.text}</div>
            ${q.img ? `<img src="${q.img}" class="content-img">` : ''}
            ${q.options.map((o, i) => `<div class="option" onclick="checkAns(${i}, ${q.correct}, '${q.id}')">${o}</div>`).join("")}
            <div class="rationale" id="rat"><strong>Rationale:</strong><br>${q.rationale}</div>
          </div>
        </div>
      `;
      document.getElementById("nav-btns").innerHTML = `
        <button class="btn btn-light" onclick="prevQ()">Previous</button>
        <button class="btn btn-gold" onclick="nextQ()">Next</button>
      `;
    }

    function checkAns(idx, correct, qId){
      const opts = document.querySelectorAll(".option");
      opts.forEach((op, i) => op.className = "option " + (i===correct?"correct":(i===idx?"wrong":"")));
      document.getElementById("rat").style.display = "block";
      
      // Save progress if not already saved
      if(!answeredQuestions.includes(qId)){
        answeredQuestions.push(qId);
        localStorage.setItem('answered_questions', JSON.stringify(answeredQuestions));
        updateProgressUI();
      }
    }

    function goBack(){
      const viewArea = document.getElementById("view-area");
      const subDb = document.getElementById("sub-dashboard");

      if(viewArea.style.display === "block"){
        openCategory(currentCategory); // يرجع للاقسام الفرعية
      } else if(subDb.style.display === "grid"){
        renderMainDashboard(); // يرجع للرئيسية
      }
    }

    function nextQ(){ if(currentIdx < filteredQuestions.length - 1){ currentIdx++; showQuestion(); } }
    function prevQ(){ if(currentIdx > 0){ currentIdx--; showQuestion(); } }
    function switchMainTab(t){ activeMainTab = t; renderMainDashboard(); updateProgressUI(); }
    function getIcon(c){ const icons = {Medicine:"🩺", Surgery:"🔪", Pediatrics:"👶", Psychiatry:"🧠", Ethics:"⚖️", OBGYN:"🤰"}; return icons[c] || "📚"; }

    init();
  </script>
</body>
</html>
